<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M256 48 L432 128 L432 304 Q432 432 256 480 Q80 432 80 304 L80 128 Z"/>
    </clipPath>
  </defs>

  <!-- Background circle — Swiss precision -->
  <circle cx="256" cy="256" r="248" fill="url(#g1)"/>

  <!-- Grid lines — Swiss design backbone (subtle) -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04">
    <line x1="128" y1="48" x2="128" y2="480"/>
    <line x1="256" y1="48" x2="256" y2="480"/>
    <line x1="384" y1="48" x2="384" y2="480"/>
    <line x1="48" y1="176" x2="480" y2="176"/>
    <line x1="48" y1="304" x2="480" y2="304"/>
  </g>

  <!-- Shield form — geometric, deconstructed -->
  <g clip-path="url(#shieldClip)">
    <!-- Main shield body -->
    <path d="M256 48 L432 128 L432 304 Q432 432 256 480 Q80 432 80 304 L80 128 Z"
          fill="url(#g3)" opacity="0.9"/>

    <!-- Postmodern diagonal slice -->
    <polygon points="80,128 432,304 432,432 80,432" fill="#0f3460" opacity="0.5"/>

    <!-- Horizontal bands — Swiss rhythm -->
    <rect x="80" y="176" width="352" height="3" fill="#e94560" opacity="0.7"/>
    <rect x="80" y="256" width="352" height="2" fill="#ffffff" opacity="0.1"/>
    <rect x="80" y="336" width="352" height="3" fill="#e94560" opacity="0.4"/>
  </g>

  <!-- Shield stroke -->
  <path d="M256 48 L432 128 L432 304 Q432 432 256 480 Q80 432 80 304 L80 128 Z"
        fill="none" stroke="#e94560" stroke-width="3" opacity="0.8"/>

  <!-- Claw marks — 3 diagonal slashes, postmodern gesture -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M168 160 L208 340 L200 380"
          stroke="#e94560" stroke-width="28" opacity="0.9"/>
    <path d="M168 160 L208 340 L200 380"
          stroke="#ff6b81" stroke-width="16" opacity="0.4"/>

    <path d="M240 140 L264 350 L258 396"
          stroke="#e94560" stroke-width="28" opacity="0.9"/>
    <path d="M240 140 L264 350 L258 396"
          stroke="#ff6b81" stroke-width="16" opacity="0.4"/>

    <path d="M312 160 L320 340 L316 380"
          stroke="#e94560" stroke-width="28" opacity="0.9"/>
    <path d="M312 160 L320 340 L316 380"
          stroke="#ff6b81" stroke-width="16" opacity="0.4"/>
  </g>

  <!-- Lock keyhole — centered, geometric -->
  <g transform="translate(256, 290)">
    <circle cx="0" cy="-16" r="20" fill="#1a1a2e" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
    <rect x="-8" y="-4" width="16" height="32" rx="4" fill="#1a1a2e" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner keyhole glow -->
    <circle cx="0" cy="-16" r="10" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Corner accent — postmodern asymmetry -->
  <rect x="72" y="56" width="40" height="6" rx="3" fill="#e94560" opacity="0.8"/>
  <rect x="72" y="56" width="6" height="40" rx="3" fill="#e94560" opacity="0.8"/>

  <rect x="400" y="456" width="40" height="6" rx="3" fill="#533483" opacity="0.6"/>
  <rect x="434" y="422" width="6" height="40" rx="3" fill="#533483" opacity="0.6"/>

  <!-- Typography — SC monogram, Helvetica-spirit -->
  <text x="256" y="484" text-anchor="middle"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="24" font-weight="700" letter-spacing="12" fill="#ffffff" opacity="0.15">
    SECURECLAW
  </text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 220" width="840" height="220">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#533483"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#c23152"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0"/>
      <stop offset="50%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bannerClip">
      <rect x="0" y="0" width="840" height="220" rx="12"/>
    </clipPath>
    <clipPath id="miniShield">
      <path d="M110 22 L178 42 L178 86 Q178 138 110 158 Q42 138 42 86 L42 42 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="840" height="220" rx="12" fill="url(#bg)"/>

  <!-- Swiss grid lines -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.04" clip-path="url(#bannerClip)">
    <line x1="210" y1="0" x2="210" y2="220"/>
    <line x1="420" y1="0" x2="420" y2="220"/>
    <line x1="630" y1="0" x2="630" y2="220"/>
    <line x1="0" y1="73" x2="840" y2="73"/>
    <line x1="0" y1="147" x2="840" y2="147"/>
  </g>

  <!-- Diagonal postmodern slice -->
  <polygon points="0,140 840,60 840,220 0,220" fill="#0f3460" opacity="0.15" clip-path="url(#bannerClip)"/>

  <!-- Horizontal accent bands — Swiss rhythm -->
  <rect x="0" y="68" width="840" height="2" fill="#e94560" opacity="0.3"/>
  <rect x="0" y="152" width="840" height="2" fill="#e94560" opacity="0.2"/>

  <!-- ====== Mini shield icon ====== -->
  <g clip-path="url(#miniShield)">
    <path d="M110 22 L178 42 L178 86 Q178 138 110 158 Q42 138 42 86 L42 42 Z"
          fill="url(#shield)" opacity="0.9"/>
    <polygon points="42,42 178,86 178,138 42,138" fill="#0f3460" opacity="0.5"/>
    <rect x="42" y="68" width="136" height="2" fill="#e94560" opacity="0.7"/>
    <rect x="42" y="110" width="136" height="2" fill="#e94560" opacity="0.4"/>
  </g>

  <!-- Shield stroke -->
  <path d="M110 22 L178 42 L178 86 Q178 138 110 158 Q42 138 42 86 L42 42 Z"
        fill="none" stroke="#e94560" stroke-width="2" opacity="0.8"/>

  <!-- Claw marks inside shield -->
  <g stroke-linecap="round" fill="none">
    <path d="M82 48 L92 128 L90 142" stroke="#e94560" stroke-width="10" opacity="0.9"/>
    <path d="M82 48 L92 128 L90 142" stroke="#ff6b81" stroke-width="5" opacity="0.4"/>
    <path d="M108 42 L114 130 L112 146" stroke="#e94560" stroke-width="10" opacity="0.9"/>
    <path d="M108 42 L114 130 L112 146" stroke="#ff6b81" stroke-width="5" opacity="0.4"/>
    <path d="M134 48 L138 128 L136 142" stroke="#e94560" stroke-width="10" opacity="0.9"/>
    <path d="M134 48 L138 128 L136 142" stroke="#ff6b81" stroke-width="5" opacity="0.4"/>
  </g>

  <!-- Lock keyhole -->
  <g transform="translate(110, 100)">
    <circle cx="0" cy="-6" r="7" fill="#1a1a2e" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <rect x="-3" y="-1" width="6" height="12" rx="2" fill="#1a1a2e" stroke="#ffffff" stroke-width="1.5" opacity="0.9"/>
    <circle cx="0" cy="-6" r="3.5" fill="none" stroke="#e94560" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Corner accents — postmodern asymmetry -->
  <rect x="16" y="16" width="16" height="3" rx="1.5" fill="#e94560" opacity="0.8"/>
  <rect x="16" y="16" width="3" height="16" rx="1.5" fill="#e94560" opacity="0.8"/>
  <rect x="808" y="201" width="16" height="3" rx="1.5" fill="#533483" opacity="0.6"/>
  <rect x="821" y="188" width="3" height="16" rx="1.5" fill="#533483" opacity="0.6"/>

  <!-- ====== Typography ====== -->

  <!-- "Secure" — light weight, Helvetica spirit -->
  <text x="228" y="112" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="300" fill="#ffffff" letter-spacing="-1" opacity="0.9">Secure</text>

  <!-- "Claw" — bold, accent red -->
  <text x="530" y="112" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="72" font-weight="700" fill="#e94560" letter-spacing="-1">Claw</text>

  <!-- Decorative line -->
  <line x1="230" y1="130" x2="780" y2="130" stroke="url(#lineGrad)" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="230" y="156" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="16" font-weight="400" fill="#ffffff" letter-spacing="3" opacity="0.5">
    ENTERPRISE AI AGENT SECURITY FRAMEWORK
  </text>

  <!-- Subtle version marker — Swiss precision -->
  <text x="780" y="200" text-anchor="end"
        font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="11" font-weight="400" fill="#533483" letter-spacing="2" opacity="0.4">
    v1.0
  </text>
</svg>
